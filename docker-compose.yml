services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_CURRENCY_SYMBOL=${NEXT_PUBLIC_CURRENCY_SYMBOL:-₸}
    environment:
      - NODE_ENV=production

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      - PORT=${BACKEND_PORT:-4000}
      - DATABASE_URL=postgresql://${DB_USER:-volt}:${DB_PASSWORD:-volt}@db:5432/${DB_NAME:-volt}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - volt-network

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-volt}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-volt}
      POSTGRES_DB: ${DB_NAME:-volt}
    ports:
      - "${DB_HOST_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-volt}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - volt-network

volumes:
  pgdata:

networks:
  volt-network:
    driver: bridge