services:
  postgres:
    image: postgres:16-alpine
    container_name: volt-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: volt_db
      POSTGRES_USER: volt_app
      POSTGRES_PASSWORD: VoltAppPass_2026!
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U volt_app -d volt_db"]
      interval: 5s
      timeout: 5s
      retries: 15

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: volt-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://volt_app:VoltAppPass_2026!@postgres:5432/volt_db
      JWT_SECRET: volt_dev_secret_change_me
      JWT_EXPIRES_IN: 7d
      FRONTEND_URL: http://localhost:3000
      CLOUDINARY_CLOUD_NAME: ""
      CLOUDINARY_API_KEY: ""
      CLOUDINARY_API_SECRET: ""
      PORT: 4000
    ports:
      - "4000:4000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost
    container_name: volt-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    environment:
      NEXT_PUBLIC_API_URL: http://localhost
      INTERNAL_API_URL: http://backend:4000
      NEXT_PUBLIC_CURRENCY_SYMBOL: $
    expose:
      - "3000"

  nginx:
    build:
      context: .
      dockerfile: nginx.Dockerfile
    container_name: volt-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  postgres_data:
