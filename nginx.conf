upstream backend {
    server backend:4000;
}

upstream frontend {
    server frontend:3000;
}

# 1) HTTP для www -> редирект на основной домен (опционально)
server {
    listen 80;
    server_name www.voltstore.app;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    return 301 https://voltstore.app$request_uri;
}

# 2) HTTP для основного домена: challenge + health + редирект на HTTPS
server {
    listen 80;
    server_name voltstore.app;
    client_max_body_size 50M;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# 3) HTTPS для www -> редирект на основной домен (опционально)
server {
    listen 443 ssl;
    http2 on;
    server_name www.voltstore.app;

    ssl_certificate     /etc/letsencrypt/live/voltstore.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/voltstore.app/privkey.pem;

    return 301 https://voltstore.app$request_uri;
}

# 4) Основной HTTPS сервер
server {
    listen 443 ssl;
    http2 on;
    server_name voltstore.app;
    client_max_body_size 50M;

    ssl_certificate     /etc/letsencrypt/live/voltstore.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/voltstore.app/privkey.pem;

    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # API -> backend
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 3;
    }

    # Статика
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Всё остальное -> frontend (Next.js)
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 3;
    }
}